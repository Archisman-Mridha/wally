syntax = "proto3";

package wally.v1;

message WALEntry {
  uint32 lsn = 1;

  bool is_checkpoint = 2;

  /*
     Files on disk may get damaged or corrupted by software bugs and hardware failures. To identify
     these problems preemptively and avoid propagating corrupt data to other subsystems or even
     nodes, we can use checksums and cyclic redundancy checks (CRCs).

     Some sources make no distinction between cryptographic and noncryptographic hash functions,
     CRCs, and checksums. What they all have in common is that they reduce a large chunk of data to
     a small number, but their use cases, purposes, and guarantees are different.

     Checksums provide the weakest form of guarantee and aren’t able to detect corruption in
     multiple bits. They’re usually computed by using XOR with parity checks or summation.

     CRCs can help detect burst errors (e.g., when multiple consecutive bits got corrupted) and
     their implementations usually use lookup tables and polynomial division. Multibit errors are
     crucial to detect, since a significant percentage of failures in communication networks and
     storage devices manifest this way.

     WARNING: Noncryptographic hashes and CRCs should not be used to verify whether or not the data
             has been tampered with. For this, you should always use strong cryptographic hashes
             designed for security. The main goal of CRC is to make sure that there were no
             unintended and accidental changes in data. These algorithms are not designed to resist
             attacks and intentional changes in data.

     Before writing the data on disk, we compute its checksum and write it together with the data.
     When reading it back, we compute the checksum again and compare it with the written one. If
     there’s a checksum mismatch, we know that corruption has occurred and we should not use the
     data that was read.

     Since computing a checksum over the whole file is often impractical and it is unlikely we’re
     going to read the entire content every time we access it, page checksums are usually computed
     on pages and placed in the page header. This way, checksums can be more robust (since they are
     performed on a small subset of the data), and the whole file doesn’t have to be discarded if
     corruption is contained in a single page.
  */
  uint32 crc = 3;

  bytes data = 4;
}
